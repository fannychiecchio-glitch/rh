<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="M&F RH">
<meta name="theme-color" content="#1C2E45">
<title>Marius & Fanny — Plateforme RH</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#80B0E8;--sky-light:#B8D4F4;--sky-pale:#DCE9F8;--sky-deep:#4A7FC1;--sky-dark:#1E3A5F;
  --cream:#E8D870;--cream-light:#F5EFA0;--cream-pale:#FDFBE8;--cream-dark:#B8A830;
  --white:#FFFFFF;--navy:#1C2E45;--navy-mid:#2E4A6E;--navy-light:#3D6494;
  --border:#A8C8EE;--border-light:#C8DDF4;--text-main:#1C2E45;--text-mid:#3D6494;--text-muted:#6890BE;
  --green:#52C98A;--green-light:#D0F4E4;--green-dark:#1E8A52;
  --orange:#F08050;--orange-light:#FCDECE;--red:#E85050;--red-light:#FCDCDC;
  --purple:#8878E8;--purple-light:#E0DCFF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--sky-pale);color:var(--text-main);min-height:100vh;}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--sky-dark);padding:2rem;position:relative;overflow:hidden;}
.auth-screen::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:var(--sky);opacity:0.12;top:-150px;right:-150px;}
.auth-screen::after{content:'';position:absolute;width:350px;height:350px;border-radius:50%;background:var(--cream);opacity:0.08;bottom:-100px;left:-100px;}
.auth-logo{text-align:center;margin-bottom:1.5rem;z-index:1;}

.auth-logo .tagline{color:var(--sky-light);font-size:0.82rem;margin-top:6px;letter-spacing:2px;text-transform:uppercase;font-weight:700;}
.auth-card{background:var(--white);border-radius:24px;padding:2rem;width:100%;max-width:440px;z-index:1;border:3px solid var(--sky-light);}
.lang-toggle,.role-tabs{display:flex;gap:8px;margin-bottom:1.2rem;}
.lang-btn,.role-tab{flex:1;padding:9px;border:2.5px solid var(--border-light);background:transparent;border-radius:12px;cursor:pointer;font-family:inherit;font-size:0.88rem;font-weight:700;transition:all 0.15s;text-align:center;color:var(--text-mid);}
.lang-btn.active{border-color:var(--cream);background:var(--cream-pale);color:var(--navy);}
.role-tab.active{border-color:var(--sky);background:var(--sky-pale);color:var(--sky-dark);}
.field-group{margin-bottom:1rem;}
.field-group label{font-size:0.75rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;}
.field-group input,.field-group select{width:100%;padding:10px 14px;border:2.5px solid var(--border-light);border-radius:12px;font-family:inherit;font-size:0.95rem;font-weight:600;outline:none;color:var(--text-main);}
.field-group input:focus,.field-group select:focus{border-color:var(--sky);}
.btn-primary{width:100%;padding:13px;background:var(--sky);border:none;border-radius:14px;font-family:inherit;font-size:1rem;font-weight:800;cursor:pointer;color:var(--white);transition:all 0.15s;}
.btn-primary:hover{background:var(--sky-deep);}
.training-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.training-check{display:flex;align-items:center;gap:8px;padding:9px 12px;border:2.5px solid var(--border-light);border-radius:12px;cursor:pointer;font-size:0.85rem;font-weight:700;color:var(--text-mid);transition:all 0.15s;}
.training-check.sel{border-color:var(--sky);background:var(--sky-pale);color:var(--sky-dark);}
.forgot-link{text-align:center;margin-top:0.75rem;font-size:0.82rem;color:var(--text-muted);cursor:pointer;font-weight:700;}
.forgot-link:hover{color:var(--sky-deep);}

/* PIN PAD */
.pin-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(28,46,69,0.85);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem;}
.pin-box{background:var(--white);border-radius:24px;padding:2rem;width:100%;max-width:340px;border:3px solid var(--sky-light);text-align:center;}
.pin-box h2{font-size:1.1rem;font-weight:900;color:var(--navy);margin-bottom:0.5rem;}
.pin-box p{font-size:0.85rem;color:var(--text-muted);font-weight:600;margin-bottom:1.5rem;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:1.5rem;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2.5px solid var(--border);background:transparent;transition:all 0.15s;}
.pin-dot.filled{background:var(--sky);border-color:var(--sky-deep);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-btn{padding:14px;background:var(--sky-pale);border:2px solid var(--border-light);border-radius:12px;font-family:inherit;font-size:1.1rem;font-weight:800;cursor:pointer;color:var(--navy);transition:all 0.15s;}
.pin-btn:hover{background:var(--sky-light);}
.pin-btn.del{background:var(--red-light);border-color:var(--red);color:var(--red);}
.pin-btn.cancel-btn{background:var(--cream-pale);border-color:var(--cream);color:var(--navy);grid-column:span 2;}
.pin-error{color:var(--red);font-size:0.82rem;font-weight:800;margin-top:0.75rem;min-height:1.4em;}

/* APP LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:250px;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;}
.sidebar-brand{padding:1.2rem;border-bottom:1px solid var(--navy-mid);display:flex;flex-direction:column;align-items:center;}

.sidebar-brand .sub{font-size:0.65rem;color:var(--sky-light);letter-spacing:1.5px;text-transform:uppercase;margin-top:6px;font-weight:700;opacity:0.7;}
.sidebar-user{padding:0.8rem 1rem;background:var(--navy-mid);margin:0.6rem 0.8rem;border-radius:14px;border:1px solid var(--navy-light);}
.sidebar-user .uname{font-size:0.88rem;font-weight:800;color:var(--cream-light);}
.sidebar-user .urole{font-size:0.72rem;color:var(--sky-light);margin-top:2px;font-weight:600;}
.sidebar-user .uprogress{font-size:0.72rem;color:var(--green);margin-top:4px;font-weight:700;}
.nav-section{padding:0.5rem 0.8rem;}
.nav-label{font-size:0.62rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--navy-light);padding:0.5rem 0.4rem 0.3rem;font-weight:800;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;cursor:pointer;font-size:0.88rem;font-weight:700;color:var(--sky-light);margin-bottom:3px;transition:all 0.15s;position:relative;}
.nav-item:hover{background:var(--navy-mid);color:var(--white);}
.nav-item.active{background:var(--sky);color:var(--white);}
.nav-icon{width:18px;text-align:center;font-size:1rem;}
.notif-badge{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--red);color:white;font-size:0.65rem;font-weight:900;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
.sidebar-footer{margin-top:auto;padding:1rem 0.8rem;border-top:1px solid var(--navy-mid);display:flex;flex-direction:column;gap:8px;}
.home-btn{width:100%;padding:10px;background:var(--cream);border:none;border-radius:12px;color:var(--navy);font-family:inherit;font-size:0.88rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.home-btn:hover{background:var(--cream-light);}
.logout-btn{width:100%;padding:10px;background:transparent;border:2px solid var(--navy-mid);border-radius:12px;color:var(--sky-light);font-family:inherit;font-size:0.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

.main{margin-left:250px;padding:2rem;flex:1;}
.page-header{margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:flex-start;}
.page-header h1{font-size:1.6rem;font-weight:900;color:var(--navy);}
.page-header p{color:var(--text-muted);font-size:0.9rem;margin-top:4px;font-weight:600;}
.page-home-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--cream);border:none;border-radius:12px;font-family:inherit;font-size:0.82rem;font-weight:800;cursor:pointer;color:var(--navy);}
.page-home-btn:hover{background:var(--cream-light);}

/* CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:1.5rem;}
.stat-card{border-radius:18px;padding:1.2rem;border:2.5px solid;}
.stat-card .stat-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;font-weight:800;}
.stat-card .stat-value{font-size:2rem;font-weight:900;margin-top:4px;}
.stat-card.sky{background:var(--sky-pale);border-color:var(--sky);}.stat-card.sky .stat-label{color:var(--sky-deep);}.stat-card.sky .stat-value{color:var(--sky-dark);}
.stat-card.cream{background:var(--cream-pale);border-color:var(--cream);}.stat-card.cream .stat-label{color:var(--cream-dark);}.stat-card.cream .stat-value{color:var(--navy);}
.stat-card.green{background:var(--green-light);border-color:var(--green);}.stat-card.green .stat-label{color:var(--green-dark);}.stat-card.green .stat-value{color:var(--green-dark);}
.stat-card.orange{background:var(--orange-light);border-color:var(--orange);}.stat-card.orange .stat-label{color:var(--orange);}.stat-card.orange .stat-value{color:var(--orange);}
.section-card{background:var(--white);border-radius:18px;padding:1.5rem;border:2.5px solid var(--border-light);margin-bottom:1rem;}
.section-card h3{font-size:1rem;font-weight:800;margin-bottom:1rem;color:var(--navy);}

/* TABLES */
.emp-table,.salary-table{width:100%;border-collapse:collapse;}
.emp-table th,.salary-table th{font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:800;padding:8px 12px;text-align:left;border-bottom:2px solid var(--border-light);}
.emp-table td,.salary-table td{padding:10px 12px;font-size:0.88rem;font-weight:600;border-bottom:1.5px solid var(--border-light);vertical-align:middle;color:var(--text-main);}
.emp-table tr:hover td,.salary-table tr:hover td{background:var(--sky-pale);}
.status-pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:800;}
.status-pill.completed{background:var(--green-light);color:var(--green-dark);}
.status-pill.in-progress{background:var(--cream-pale);color:var(--cream-dark);}
.status-pill.new-emp{background:var(--sky-pale);color:var(--sky-deep);}

/* DOC LIST */
.doc-list{display:flex;flex-direction:column;gap:8px;}
.doc-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--sky-pale);border-radius:14px;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.doc-item:hover{background:var(--cream-pale);border-color:var(--cream);}
.doc-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.doc-icon.yellow{background:var(--cream);}.doc-icon.green{background:var(--green-light);}
.doc-icon.black{background:var(--navy);color:white;}.doc-icon.red{background:var(--red-light);}
.doc-icon.purple{background:var(--purple-light);}.doc-icon.sky{background:var(--sky);color:white;}
.doc-info{flex:1;}
.doc-info .doc-title{font-size:0.9rem;font-weight:800;color:var(--navy);}
.doc-info .doc-sub{font-size:0.78rem;color:var(--text-muted);margin-top:2px;font-weight:600;}
.doc-check{width:24px;height:24px;border-radius:50%;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:transparent;flex-shrink:0;}
.doc-check.checked{background:var(--sky);border-color:var(--sky-deep);color:var(--white);}

/* ATTEST */
.attest-box{background:var(--cream-pale);border:2.5px solid var(--cream);border-radius:14px;padding:1.2rem;margin-top:1rem;}
.attest-box p{font-size:0.88rem;font-weight:700;color:var(--navy);margin-bottom:0.75rem;line-height:1.6;}
.attest-btn{padding:10px 22px;background:var(--sky);color:var(--white);border:none;border-radius:12px;font-family:inherit;font-size:0.9rem;font-weight:800;cursor:pointer;}
.attest-done{display:flex;align-items:center;gap:8px;color:var(--sky-deep);font-weight:800;font-size:0.9rem;}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(28,46,69,0.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:var(--white);border-radius:24px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;border:3px solid var(--border-light);}
.modal.wide{max-width:800px;}
.modal-header{padding:1.5rem 1.5rem 1rem;border-bottom:2px solid var(--border-light);position:sticky;top:0;background:var(--white);z-index:1;display:flex;align-items:center;justify-content:space-between;border-radius:22px 22px 0 0;}
.modal-header h2{font-size:1.15rem;font-weight:900;color:var(--navy);}
.modal-close{background:var(--sky-pale);border:none;border-radius:8px;font-size:1rem;cursor:pointer;color:var(--text-mid);padding:6px 10px;font-weight:800;}
.modal-body{padding:1.5rem;}
.modal-footer{padding:1rem 1.5rem;border-top:2px solid var(--border-light);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;}
.btn-sec{padding:9px 18px;border:2.5px solid var(--border);background:transparent;border-radius:12px;font-family:inherit;font-size:0.9rem;font-weight:700;cursor:pointer;color:var(--text-mid);}
.btn-sky{padding:9px 18px;background:var(--sky);color:var(--white);border:none;border-radius:12px;font-family:inherit;font-size:0.9rem;font-weight:800;cursor:pointer;}
.btn-cream{padding:9px 18px;background:var(--cream);color:var(--navy);border:none;border-radius:12px;font-family:inherit;font-size:0.9rem;font-weight:800;cursor:pointer;}
.btn-green{padding:9px 18px;background:var(--green);color:var(--white);border:none;border-radius:12px;font-family:inherit;font-size:0.9rem;font-weight:800;cursor:pointer;}
.btn-orange{padding:9px 18px;background:var(--orange);color:var(--white);border:none;border-radius:12px;font-family:inherit;font-size:0.9rem;font-weight:800;cursor:pointer;}
.btn-danger{padding:9px 18px;background:var(--red);color:var(--white);border:none;border-radius:12px;font-family:inherit;font-size:0.9rem;font-weight:800;cursor:pointer;}
.btn-orange{padding:9px 18px;background:var(--orange);color:var(--white);border:none;border-radius:12px;font-family:inherit;font-size:0.9rem;font-weight:800;cursor:pointer;}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem;}
.form-row.full{grid-template-columns:1fr;}
.form-field label{font-size:0.75rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:5px;}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:9px 12px;border:2.5px solid var(--border-light);border-radius:12px;font-family:inherit;font-size:0.9rem;font-weight:600;outline:none;color:var(--text-main);}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--sky);}
.form-field textarea{resize:vertical;min-height:80px;}

/* TIMELINE */
.timeline{position:relative;padding-left:22px;}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:3px;background:var(--border-light);border-radius:2px;}
.timeline-item{position:relative;margin-bottom:1rem;}
.timeline-item::before{content:'';position:absolute;left:-17px;top:5px;width:12px;height:12px;border-radius:50%;background:var(--sky);border:3px solid var(--white);box-shadow:0 0 0 2px var(--sky);}
.timeline-item .tl-date{font-size:0.75rem;color:var(--text-muted);font-weight:700;}
.timeline-item .tl-val{font-size:1rem;font-weight:900;color:var(--navy);}
.timeline-item .tl-note{font-size:0.8rem;color:var(--text-muted);font-weight:600;}

/* EVAL */
.eval-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1.5px solid var(--border-light);}
.eval-row:last-child{border-bottom:none;}
.eval-row .eval-label{flex:1;font-size:0.88rem;font-weight:700;color:var(--text-main);}
.score-dot{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--border-light);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:800;color:var(--text-muted);transition:all 0.1s;}
.score-dot.active{background:var(--sky);border-color:var(--sky-deep);color:var(--white);}
.score-dot.readonly{cursor:default;}
.eval-section-label{display:inline-block;font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--white);background:var(--sky-deep);padding:4px 14px;border-radius:20px;margin:1rem 0 0.5rem;}

/* WARNINGS */
.warn-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:0.78rem;font-weight:800;}
.warn-badge.oral{background:var(--cream-pale);color:var(--cream-dark);}
.warn-badge.written{background:var(--red-light);color:var(--red);}

/* PROGRESS */
.progress-bar{background:var(--border-light);border-radius:20px;height:8px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--cream));border-radius:20px;}

/* CHIPS */
.chip{display:inline-block;padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:800;background:var(--sky-pale);color:var(--sky-deep);margin:2px;}
.chip.green{background:var(--green-light);color:var(--green-dark);}
.chip.red{background:var(--red-light);color:var(--red);}
.chip.cream{background:var(--cream-pale);color:var(--cream-dark);}

/* UPLOAD */
.upload-zone{border:3px dashed var(--border);border-radius:16px;padding:2rem;text-align:center;cursor:pointer;background:var(--sky-pale);}
.upload-zone:hover{border-color:var(--sky-deep);background:var(--cream-pale);}
.file-preview{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--green-light);border-radius:14px;margin-top:1rem;border:2px solid var(--green);}
.file-preview .fp-name{font-size:0.9rem;font-weight:800;color:var(--green-dark);flex:1;}
.file-preview .fp-remove{background:none;border:none;cursor:pointer;color:var(--red);font-size:1rem;}
.btn-download{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:var(--sky);color:var(--white);border:none;border-radius:12px;font-family:inherit;font-size:0.88rem;font-weight:800;cursor:pointer;text-decoration:none;}

/* PDF iframe fix */
.pdf-viewer{width:100%;height:500px;border:2px solid var(--border-light);border-radius:12px;background:var(--white);}

/* OTHER */
.salary-increase{font-size:0.72rem;color:var(--green-dark);font-weight:800;}
.new-doc-badge{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:6px;vertical-align:middle;}
.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.cat-badge{font-size:0.7rem;padding:4px 12px;border-radius:20px;font-weight:800;background:var(--sky-pale);color:var(--sky-deep);}
.doc-content{font-size:0.9rem;line-height:1.7;font-weight:600;color:var(--text-main);}
.doc-content h3{font-size:1rem;font-weight:900;margin:1rem 0 0.5rem;color:var(--sky-deep);}
.doc-content p{margin-bottom:0.75rem;}
.doc-content ul{padding-left:1.2rem;margin-bottom:0.75rem;}
.doc-content li{margin-bottom:4px;}

/* QUIZ */
.quiz-card{background:var(--cream-pale);border:2.5px solid var(--cream);border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
.quiz-q{font-size:0.95rem;font-weight:800;color:var(--navy);margin-bottom:1rem;}
.quiz-options{display:flex;flex-direction:column;gap:8px;}
.quiz-option{padding:10px 14px;border:2.5px solid var(--border-light);border-radius:12px;cursor:pointer;font-size:0.88rem;font-weight:700;color:var(--text-main);transition:all 0.15s;background:var(--white);}
.quiz-option:hover{border-color:var(--sky);background:var(--sky-pale);}
.quiz-option.correct{border-color:var(--green);background:var(--green-light);color:var(--green-dark);}
.quiz-option.wrong{border-color:var(--red);background:var(--red-light);color:var(--red);}
.quiz-option.selected{border-color:var(--sky);background:var(--sky-pale);}

/* ANNOTATION */

  font-size:0.72rem;font-weight:700;padding:5px 10px;border-radius:8px;

  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);

}

function loadState() {
  const saved = DB.load();
  if (saved) {
    if (saved.employees) state.employees = saved.employees;
    if (saved.customDocs) customDocs = saved.customDocs;
    if (saved.customQuizzes) customQuizzes = saved.customQuizzes;
    if (saved.rolesFR) ROLES_FR = saved.rolesFR;
    if (saved.rolesEN) ROLES_EN = saved.rolesEN;
    if (saved.roleIcons) ROLE_ICONS = saved.roleIcons;
    if (saved.managerPin) MANAGER_PIN = saved.managerPin;
    T.fr.roles = ROLES_FR;
    T.en.roles = ROLES_EN;
  }
}

function saveState() {
  DB.save({
    employees: state.employees,
    customDocs: customDocs,
    customQuizzes: customQuizzes,
    rolesFR: ROLES_FR,
    rolesEN: ROLES_EN,
    roleIcons: ROLE_ICONS,
    managerPin: MANAGER_PIN
  });
}

function t(k) { return T[state.lang][k] || k; }
function allDocs() { return [...BUILTIN_DOCS[state.lang], ...customDocs]; }
function getMyEmp() { return state.employees.find(e => e.name === state.currentUser?.name) || state.employees[0]; }
function empDocs(emp) {
  const tr = emp.training || [];
  return allDocs().filter(d => !d.forRoles || d.forRoles.length === 0 || d.forRoles.some(r => tr.includes(r)));
}
function getEmpProgress(emp) {
  const d = empDocs(emp);
  const total = d.length;
  const done = d.filter(doc => emp.attestations && emp.attestations[doc.id]).length;
  return { done, total, pct: total > 0 ? Math.round(done / total * 100) : 0 };
}
function getEvalCriteria(role) {
  const map = T[state.lang].evalCriteria;
  return map[role] || map[Object.keys(map)[0]];
}
function getQuiz(role) {
  if (customQuizzes[role] && customQuizzes[role].length > 0) return customQuizzes[role];
  const qt = T[state.lang].quizTemplates;
  return qt[role] || qt[Object.keys(qt)[0]];
}
function totalNotifications(emp) {
  if (!emp.notifications) return 0;
  return (emp.notifications.docs || 0) + (emp.notifications.salary || 0) + (emp.notifications.warnings || 0) + (emp.notifications.evals || 0);
}

function showNotif(msg) {
  const n = document.getElementById('notif');
  document.getElementById('notif-msg').textContent = msg;
  n.classList.add('show');
  const bar = document.getElementById('notif-bar');
  bar.style.animation = 'none';
  setTimeout(() => { bar.style.animation = 'shrink 3s linear forwards'; }, 10);
  setTimeout(() => n.classList.remove('show'), 3000);
}

function saveFirstLoginPassword(empId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return;
  const newPwd = document.getElementById('fl-pwd-new')?.value;
  const confirm = document.getElementById('fl-pwd-confirm')?.value;
  const errEl = document.getElementById('fl-error');
  if (!newPwd || newPwd.length < 4) { if(errEl) errEl.textContent = 'Minimum 4 caractères.'; return; }
  if (newPwd !== confirm) { if(errEl) errEl.textContent = 'Les mots de passe ne correspondent pas.'; return; }
  emp.password = newPwd;
  emp.passwordChanged = true;
  state.showFirstLoginModal = false;
  state.firstLoginEmpId = null;
  saveState();
  render();
  showNotif('🔐 Mot de passe créé avec succès!');
}

function skipFirstLogin() {
  state.showFirstLoginModal = false;
  state.firstLoginEmpId = null;
  render();
}

function renderPinPad() {
  if (!state.showPin) return '';
  const dots = [...Array(4)].map((_, i) =>
    `<div class="pin-dot ${i < state.pinValue.length ? 'filled' : ''}"></div>`
  ).join('');
  return `<div class="pin-overlay">
    <div class="pin-box">
      <h2>🔐 ${t('pinTitle')}</h2>
      <p>${t('pinSub')}</p>
      <div class="pin-dots">${dots}</div>
      <div class="pin-grid">
        ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="pin-btn" onclick="pinPress('${n}')">${n}</button>`).join('')}
        <button class="pin-btn del" onclick="pinDel()">⌫</button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn cancel-btn" onclick="pinCancel()">✕ ${t('cancel')}</button>
      </div>
      <div class="pin-error">${state.pinError}</div>
    </div>
  </div>`;
}

function pinPress(n) {
  if (state.pinValue.length >= 4) return;
  state.pinValue += n;
  state.pinError = '';
  if (state.pinValue.length === 4) {
    if (state.pinValue === MANAGER_PIN) {
      state.showPin = false; state.pinValue = ''; state.pinError = '';
      state.currentUser = { name: 'Gestionnaire', role: t('manager') };
      state.isManager = true; state.screen = 'app'; state.activePage = 'dashboard';
      render(); showNotif(t('welcome') + ', Gestionnaire! 🎉');
    } else {
      state.pinError = t('pinError');
      setTimeout(() => { state.pinValue = ''; state.pinError = ''; render(); }, 900);
      render();
    }
  } else render();
}
function pinDel() { if (state.pinValue.length > 0) { state.pinValue = state.pinValue.slice(0, -1); render(); } }
function pinCancel() { state.showPin = false; state.pinValue = ''; state.pinError = ''; state.isManager = false; render(); }

function fmtDate(d) {
  if (!d) return '';
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  return parseInt(parts[2]) + ' ' + months[parseInt(parts[1])-1] + ' ' + parts[0];
}
function fmtRange(from, to) {
  return fmtDate(from) + ' au ' + fmtDate(to);
}

function setVacType(type) {
  const cont  = document.getElementById('vac-form-continuous');
  const split = document.getElementById('vac-form-split');
  const btnC  = document.getElementById('vt-continuous');
  const btnS  = document.getElementById('vt-split');
  if (!cont || !split) return;
  if (type === 'continuous') {
    cont.style.display  = ''; split.style.display = 'none';
    btnC.classList.add('sel'); btnS.classList.remove('sel');
  } else {
    cont.style.display  = 'none'; split.style.display = '';
    btnS.classList.add('sel'); btnC.classList.remove('sel');
  }
}

function submitVacRequest(empId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return;

  const isSplit = document.getElementById('vt-split')?.classList.contains('sel');

  if (isSplit) {
    // Collect all split periods
    const periods = [];
    for (let i = 1; i <= splitPeriodCount + 5; i++) {
      const f = document.getElementById('vac-s'+i+'-from')?.value;
      const t = document.getElementById('vac-s'+i+'-to')?.value;
      if (f && t) {
        if (t < f) { showNotif('Période '+i+' : la date de fin doit être après le début'); return; }
        periods.push({from:f, to:t});
      }
    }
    if (periods.length < 1) { showNotif('Veuillez indiquer au moins une période'); return; }
    if (!emp.vacationRequests) emp.vacationRequests = [];
    emp.vacationRequests.push({
      id: 'vr'+Date.now(), status:'pending', type:'split',
      year: emp.vacationFormYear || new Date().getFullYear(),
      date: new Date().toLocaleDateString('fr-CA'),
      periods: periods,
      // For backward compat, use first period as choice1 and second as choice2
      choice1from: periods[0].from, choice1to: periods[0].to,
      choice2from: periods[1]?.from||periods[0].from, choice2to: periods[1]?.to||periods[0].to,
      counterFrom:null, counterTo:null, counterNote:null,
      approvedFrom:null, approvedTo:null
    });
  } else {
    const c1f = document.getElementById('vac-c1-from')?.value;
    const c1t = document.getElementById('vac-c1-to')?.value;
    const c2f = document.getElementById('vac-c2-from')?.value;
    const c2t = document.getElementById('vac-c2-to')?.value;
    if (!c1f || !c1t || !c2f || !c2t) { showNotif('Veuillez remplir les 4 dates'); return; }
    if (c1t < c1f) { showNotif('Choix préféré : la date de fin doit être après le début'); return; }
    if (c2t < c2f) { showNotif('Choix alternatif : la date de fin doit être après le début'); return; }
    if (!emp.vacationRequests) emp.vacationRequests = [];
    emp.vacationRequests.push({
      id: 'vr'+Date.now(), status:'pending', type:'continuous',
      year: emp.vacationFormYear || new Date().getFullYear(),
      date: new Date().toLocaleDateString('fr-CA'),
      choice1from:c1f, choice1to:c1t,
      choice2from:c2f, choice2to:c2t,
      counterFrom:null, counterTo:null, counterNote:null,
      approvedFrom:null, approvedTo:null
    });
  }

  splitPeriodCount = 2;
  saveState(); showNotif('✅ Demande envoyée!'); render();
}

function acceptCounter(empId, reqId) {
  const emp = state.employees.find(e => e.id === empId);
  const req = (emp?.vacationRequests||[]).find(r => r.id === reqId);
  if (!req) return;
  req.status = 'approved';
  req.approvedFrom = req.counterFrom;
  req.approvedTo   = req.counterTo;
  if (!emp.notifications) emp.notifications = {};
  emp.notifications.vacations = (emp.notifications.vacations||0) + 1;
  saveState(); showNotif('✅ Dates acceptées!'); render();
}

function rejectCounter(empId, reqId) {
  const emp = state.employees.find(e => e.id === empId);
  const req = (emp?.vacationRequests||[]).find(r => r.id === reqId);
  if (!req) return;
  req.status = 'pending';
  req.counterFrom = null; req.counterTo = null; req.counterNote = null;
  saveState(); showNotif('Demande renvoyée'); render();
}

function renderVacationMgr() {
  const allReqs = state.employees.flatMap(e =>
    (e.vacationRequests||[]).map(r => ({...r, empName:e.name, empId:e.id, empRole:e.role}))
  ).sort((a,b) => a.status==='pending'?-1:1);
  const pending = allReqs.filter(r => r.status==='pending');
  const approved = allReqs.filter(r => r.status==='approved');

  // Calendar only shows vacations whose last day ended less than 1 month ago
  const oneMonthAgo = new Date();
  oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
  const oneMonthAgoStr = oneMonthAgo.toISOString().split('T')[0];
  function getLastDay(r) {
    if (r.type === 'split' && r.periods && r.periods.length > 0)
      return r.periods.reduce((max, p) => p.to > max ? p.to : max, '');
    return r.approvedTo || '';
  }
  const approvedForCalendar = approved.filter(r => getLastDay(r) >= oneMonthAgoStr);

  const salesRoles = ROLES_FR.filter(r => r.toLowerCase().includes('vente') || r.toLowerCase().includes('sale'));
  const approvedSales  = approvedForCalendar.filter(r => salesRoles.includes(r.empRole));
  const approvedOthers = approvedForCalendar.filter(r => !salesRoles.includes(r.empRole));

  return `<div class="page-header-row">
    <h1>🏖️ Vacances</h1>${homeBtn()}
  </div>
  <button class="btn-cream" style="margin-bottom:1rem;width:100%;" onclick="openSendVacForm()">📋 Envoyer le formulaire aux employés</button>

function renderVacCalendar(groupLabel, vacations) {
  if (vacations.length === 0) return '';

  // Flatten all periods (handles fractioned vacations)
  const allPeriods = vacations.flatMap(v => {
    const periods = v.type==='split' ? (v.periods||[]) : [{from:v.approvedFrom,to:v.approvedTo}];
    return periods.map(p => ({empId:v.empId, empName:v.empName, from:p.from, to:p.to}));
  }).filter(p => p.from && p.to);

  if (allPeriods.length === 0) return '';

  const allDates = allPeriods.flatMap(p => [new Date(p.from), new Date(p.to)]);
  const minDate = new Date(Math.min(...allDates));
  const maxDate = new Date(Math.max(...allDates));
  const startMonth = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  const endMonth   = new Date(maxDate.getFullYear(), maxDate.getMonth() + 1, 0);

  const months = [];
  let cur = new Date(startMonth);
  while (cur <= endMonth) { months.push(new Date(cur)); cur.setMonth(cur.getMonth() + 1); }

  const MONTH_NAMES = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const DAY_NAMES   = ['D','L','M','M','J','V','S'];
  const colorPalette = ['#80B0E8','#52C98A','#F08050','#8878E8','#E85050','#4A7FC1','#B8A830','#E8D870'];
  const empColors = {};
  vacations.forEach((v, i) => { if (!empColors[v.empId]) empColors[v.empId] = colorPalette[i % colorPalette.length]; });

  const CELL = 30;
  const GAP  = 2;
  const todayStr = new Date().toISOString().split('T')[0];

  const monthsHtml = months.map(monthStart => {
    const year = monthStart.getFullYear();
    const month = monthStart.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDow = monthStart.getDay();

    const cells = [];
    for (let blank = 0; blank < firstDow; blank++) {
      cells.push('<div style="width:'+CELL+'px;height:'+CELL+'px;"></div>');
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const onVac = allPeriods.filter(p => dateStr >= p.from && dateStr <= p.to);
      const isToday = dateStr === todayStr;
      let bg, color, border = '';

      if (onVac.length === 0) {
        bg = isToday ? 'var(--sky-pale)' : 'transparent';
        color = isToday ? 'var(--sky-deep)' : 'var(--text-main)';
        border = isToday ? 'border:2px solid var(--sky);' : '';
      } else if (onVac.length === 1) {
        bg = empColors[onVac[0].empId];
        color = '#fff';
      } else {
        // Split diagonal gradient for 2+ overlapping
        const c1 = empColors[onVac[0].empId];
        const c2 = empColors[onVac[1].empId];
        bg = 'linear-gradient(135deg,'+c1+' 50%,'+c2+' 50%)';
        color = '#fff';
      }

      const uniqueNames = [...new Set(onVac.map(p => p.empName))];
      const cellBase = 'width:'+CELL+'px;height:'+CELL+'px;display:flex;align-items:center;justify-content:center;font-size:0.72rem;border-radius:6px;background:'+bg+';color:'+color+';'+border;
      if (onVac.length > 0) {
        const tipText = uniqueNames.join(' + ');
        cells.push(
          '<div class="cal-cell" style="'+cellBase+'font-weight:800;cursor:default;">'+d
          +'<span class="cal-tip">'+tipText+'</span>'
          +'</div>'
        );
      } else {
        cells.push('<div style="'+cellBase+'font-weight:500;">'+d+'</div>');
      }
    }

    return '<div style="display:inline-block;vertical-align:top;">'
      +'<div style="font-size:0.8rem;font-weight:800;color:var(--navy);margin-bottom:5px;text-align:center;">'+MONTH_NAMES[month]+' '+year+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(7,'+CELL+'px);gap:'+GAP+'px;">'
      +DAY_NAMES.map(d=>'<div style="width:'+CELL+'px;text-align:center;font-size:0.62rem;font-weight:800;color:var(--text-muted);padding-bottom:3px;">'+d+'</div>').join('')
      +cells.join('')
      +'</div></div>';
  }).join('');

  const legend = '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1rem;">'
    +vacations.map(v=>'<div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;font-weight:700;">'
      +'<div style="width:12px;height:12px;border-radius:3px;background:'+empColors[v.empId]+';flex-shrink:0;"></div>'
      +v.empName+'</div>').join('')
    +'</div>';

  return '<div class="section-card" style="padding:1rem;">'
    +'<h3 style="margin-bottom:0.5rem;">📅 Calendrier — '+groupLabel+'</h3>'
    +legend
    +'<div style="display:flex;flex-wrap:wrap;gap:20px;">'+monthsHtml+'</div>'
    +'</div>';
}

function saveCounterVac(empId, reqId) {
  const emp = state.employees.find(e => e.id === empId);
  const req = (emp?.vacationRequests||[]).find(r => r.id === reqId);
  if (!req) return;
  const from = document.getElementById('counter-from')?.value;
  const to   = document.getElementById('counter-to')?.value;
  if (!from || !to) { showNotif('Veuillez entrer les deux dates'); return; }
  req.status = 'counter';
  req.counterFrom = from; req.counterTo = to;
  req.counterNote = document.getElementById('counter-note')?.value || '';
  if (!emp.notifications) emp.notifications = {};
  emp.notifications.vacations = (emp.notifications.vacations||0) + 1;
  sendPortalNotif(emp, '🏖️ Réponse à votre demande de vacances — Marius & Fanny RH', 'Votre gestionnaire vous a envoyé une contre-proposition pour vos vacances. Connectez-vous à votre portail RH pour accepter ou modifier.');
  saveState(); closeModal(); showNotif('💬 Contre-proposition envoyée!'); render();
}

function approveVac(empId, reqId, choice) {
  const emp = state.employees.find(e => e.id === empId);
  const req = (emp?.vacationRequests||[]).find(r => r.id === reqId);
  if (!req) return;
  req.status = 'approved';
  req.approvedFrom = choice===1 ? req.choice1from : req.choice2from;
  req.approvedTo   = choice===1 ? req.choice1to   : req.choice2to;
  if (!emp.notifications) emp.notifications = {};
  emp.notifications.vacations = (emp.notifications.vacations||0) + 1;
  sendPortalNotif(emp, '🏖️ Réponse à votre demande de vacances — Marius & Fanny RH', 'Vos vacances ont été approuvées! Connectez-vous à votre portail RH pour voir les dates confirmées.');
  saveState(); showNotif('✅ Vacances approuvées!'); render();
}

function openCounterVac(empId, reqId) {
  state.modal = {type:'counterVac', empId, reqId}; render();
}

function openSendVacForm() {
  state.modal = {type:'sendVacForm'}; render();
}

function sendVacFormToAll() {
  const year = document.getElementById('vac-form-year')?.value || new Date().getFullYear();
  state.employees.forEach(emp => {
    emp.vacationFormActive = true;
    emp.vacationFormYear = year;
    if (!emp.notifications) emp.notifications = {};
    emp.notifications.vacations = (emp.notifications.vacations||0) + 1;
    sendPortalNotif(emp, '📋 Formulaire de vacances disponible — Marius & Fanny RH', 'Le formulaire de demande de vacances pour '+year+' est maintenant disponible. Connectez-vous à votre portail RH pour entrer vos choix de dates.');
  });
  saveState(); closeModal(); showNotif(`📋 Formulaire envoyé à ${state.employees.length} employé(s)!`); render();
}

    case 'dashboard': return renderDashboard();

function getAnniversaryAlerts() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const alerts = [];

  // Window: show if milestone is within next 30 days OR passed within last 7 days
  const AHEAD = 5;   // days ahead
  const BEHIND = 7;  // days behind (just passed)

  state.employees.forEach(emp => {
    if (!emp.joined) return;
    const joined = new Date(emp.joined);
    joined.setHours(0,0,0,0);
    const diffDays = Math.floor((today - joined) / (1000 * 60 * 60 * 24));
    const diffYears = today.getFullYear() - joined.getFullYear();

    // One-time milestones (only show if not yet reached + 30 days, or passed <7 days ago)
    const milestones = [
      { days: 30,   label: '1 mois',   icon: '🌱', urgency: 'green' },
      { days: 90,   label: '3 mois',   icon: '⭐', urgency: 'sky' },
      { days: 180,  label: '6 mois',   icon: '🌟', urgency: 'cream' },
      { days: 365,  label: '1 an',     icon: '🏆', urgency: 'orange' },
      { days: 1095, label: '3 ans 🎯 Réviser % vacances', icon: '🏖️', urgency: 'orange', vacationAlert: true },
    ];

    milestones.forEach(m => {
      const delta = m.days - diffDays; // positive = coming up, negative = passed
      if (delta >= 0 && delta <= AHEAD) {
        // Coming up within 30 days
        const text = delta === 0 ? "🎉 Aujourd'hui!" : `Dans ${delta} jour${delta>1?'s':''}`;
        const urgent = delta <= 7;
        alerts.push({ emp, label: m.label, icon: m.icon, urgency: m.urgency, text, urgent, sort: delta });
      } else if (delta < 0 && delta >= -BEHIND) {
        // Just passed within 7 days
        const ago = Math.abs(delta);
        const text = `Il y a ${ago} jour${ago>1?'s':''}`;
        alerts.push({ emp, label: m.label, icon: m.icon, urgency: m.urgency, text, urgent: false, sort: 1000 + ago });
      }
    });

    // Yearly anniversaries (1 year and beyond)
    if (diffDays > 365) {
      // Check anniversary this year
      let thisYearAnniv = new Date(today.getFullYear(), joined.getMonth(), joined.getDate());
      thisYearAnniv.setHours(0,0,0,0);
      let deltaAnniv = Math.floor((thisYearAnniv - today) / (1000 * 60 * 60 * 24));

      // If this year's anniv has passed more than BEHIND days ago, check next year
      if (deltaAnniv < -BEHIND) {
        thisYearAnniv = new Date(today.getFullYear() + 1, joined.getMonth(), joined.getDate());
        deltaAnniv = Math.floor((thisYearAnniv - today) / (1000 * 60 * 60 * 24));
      }

      if (deltaAnniv >= -BEHIND && deltaAnniv <= AHEAD) {
        const yearsCount = thisYearAnniv.getFullYear() - joined.getFullYear();
        let text;
        if (deltaAnniv === 0) text = "🎉 Aujourd'hui!";
        else if (deltaAnniv > 0) text = `Dans ${deltaAnniv} jour${deltaAnniv>1?'s':''}`;
        else { const ago = Math.abs(deltaAnniv); text = `Il y a ${ago} jour${ago>1?'s':''}`; }
        const urgent = deltaAnniv >= 0 && deltaAnniv <= 7;
        alerts.push({ emp, label: `${yearsCount} an${yearsCount>1?'s':''}`, icon: '🎉', urgency: 'orange', text, urgent, sort: deltaAnniv >= 0 ? deltaAnniv : 1000 + Math.abs(deltaAnniv) });
      }
    }
  });

  // Sort: most urgent first (closest upcoming date, then recently passed)
  alerts.sort((a, b) => a.sort - b.sort);
  return alerts;
}

  </div>

        <td><strong style="color:var(--sky-dark);">${(()=>{const h=e.salary.filter(s=>s.type!=='benefit'&&s.amount!=null);return h.length>0?h[h.length-1].amount+''+t('per_hour'):'—';})()}</strong></td>
        <td><div class="progress-bar" style="width:80px;"><div class="progress-fill" style="width:${p.pct}%"></div></div><span style="font-size:0.72rem;color:var(--text-muted);font-weight:700;">${p.pct}%</span></td>
        <td style="display:flex;gap:6px;">

function setEmpFilter(r) { state.empFilter = r; render(); }

function deleteEmployee(id) {
  if (!confirm(t('confirmDelete'))) return;
  state.employees = state.employees.filter(e => e.id !== id);
  saveState(); showNotif('Employé supprimé'); render();
}

// ═══════════════════════════════════════════════════════
// SALARY OVERVIEW
// ═══════════════════════════════════════════════════════
function renderSalaryOverview() {
  const rows = state.employees.map(e => {
    const salOnly = e.salary.filter(s => s.type !== 'benefit' && s.amount != null);
    const current = salOnly.length > 0 ? salOnly[salOnly.length - 1] : {amount:0, date:'—', note:''};
    const increases = salOnly.length - 1;
    const diff = increases > 0 ? (current.amount - salOnly[salOnly.length - 2].amount).toFixed(2) : null;
    return { ...e, current, increases, diff };
  });
  const avg = rows.length > 0 ? (rows.reduce((a, e) => a + (e.current.amount||0), 0) / rows.length).toFixed(2) : '0.00';

  return `<div class="page-header"><div><h1>💰 ${t('salaryOverview')}</h1></div>${homeBtn()}</div>
  <div class="stats-grid">
    <div class="stat-card sky"><div class="stat-label">Masse salariale</div><div class="stat-value" style="font-size:1.4rem;">${rows.reduce((a,e)=>a+e.current.amount,0).toFixed(2)}${t('per_hour')}</div></div>
    <div class="stat-card cream"><div class="stat-label">Salaire moyen</div><div class="stat-value" style="font-size:1.4rem;">${avg}${t('per_hour')}</div></div>
    <div class="stat-card green"><div class="stat-label">Employés</div><div class="stat-value">${state.employees.length}</div></div>
  </div>
  <div class="section-card"><h3>📊 Tableau complet</h3>
    <div style="overflow-x:auto;"><table class="salary-table">
      <thead><tr><th>Nom</th><th>Poste</th><th>${t('hireDate')}</th><th>Salaire actuel</th><th>Dernière augm.</th><th>+/-</th><th>${t('increases')}</th><th></th></tr></thead>
      <tbody>${rows.map(e => `<tr>
        <td><strong>${e.name}</strong></td>
        <td><span class="chip">${ROLE_ICONS[e.role]||''} ${e.role}</span></td>
        <td style="color:var(--text-muted);font-size:0.82rem;">${e.joined}</td>
        <td><strong style="color:var(--sky-dark);">${e.current.amount}${t('per_hour')}</strong></td>
        <td style="font-size:0.82rem;">${(()=>{const h=e.salary.filter(s=>s.type!=='benefit'&&s.amount!=null);return h.length>1?h[h.length-1].date:t('noIncrease');})()}</td>
        <td>${e.diff?`<span class="salary-increase">+${e.diff}${t('per_hour')}</span>`:'—'}</td>
        <td style="text-align:center;">${e.increases}</td>
        <td><button class="btn-sec" style="font-size:0.78rem;padding:5px 12px;" onclick="openSalaryEdit('${e.id}')">+ Augm.</button></td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>
  <div class="section-card"><h3>📈 Historique détaillé</h3>
    ${state.employees.map(e => `<div style="margin-bottom:1.5rem;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:0.75rem;">
        <strong>${e.name}</strong><span class="chip">${e.role}</span><span class="chip green">${(()=>{const h=e.salary.filter(s=>s.type!=='benefit'&&s.amount!=null);return h.length>0?h[h.length-1].amount+t('per_hour'):'—';})()}</span>
      </div>
      <div class="timeline">${[...e.salary].reverse().map(s => `<div class="timeline-item">
        <div class="tl-date">${s.date}</div>
        ${s.type==='benefit'
          ? `<div class="tl-val" style="color:var(--green-dark);">🎁 ${s.benefit}</div><div class="tl-note">Avantage${s.note?' — '+s.note:''}</div>`
          : `<div class="tl-val">${s.amount}${t('per_hour')}</div><div class="tl-note">${s.note}</div>`}
      </div>`).join('')}</div>
    </div>`).join('')}
  </div>`;
}

        <div class="doc-info">

// ═══════════════════════════════════════════════════════
// EVALUATIONS
// ═══════════════════════════════════════════════════════
function renderEvals() {
  const emp = state.isManager ? null : getMyEmp();

  if (!state.isManager && emp) {
    return `<div class="page-header"><div><h1>📊 ${t('evaluations')}</h1></div>
      <div style="display:flex;gap:10px;">${homeBtn()}<button class="btn-sky" onclick="openSelfEval()">${t('selfEval')}</button></div></div>
    ${emp.evals.length === 0
      ? `<div class="section-card"><p style="color:var(--text-muted);text-align:center;padding:2rem;font-weight:700;">Aucune évaluation pour l'instant.</p></div>`
      : emp.evals.map(ev => {
          const crit = getEvalCriteria(ev.role || emp.role);
          return `<div class="section-card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
              <h3>${ev.type==='self'?t('selfEval'):t('managerEval')}</h3>
              <span style="font-size:0.82rem;color:var(--text-muted);font-weight:700;">${ev.date}</span>
            </div>
            ${crit.map((section, si) => `<div class="eval-section-label">${section.cat}</div>
              ${section.items.map((item, ii) => `<div class="eval-row">
                <div class="eval-label">${item}</div>
                <div style="display:flex;gap:4px;">${[1,2,3,4,5].map(s =>
                  `<div class="score-dot readonly ${(ev.scores[si+'-'+ii]||0)>=s?'active':''}">${s}</div>`
                ).join('')}</div>
              </div>`).join('')}`).join('')}
            ${ev.note ? `<div style="margin-top:1rem;padding:12px;background:var(--sky-pale);border-radius:12px;font-size:0.88rem;font-weight:600;">${ev.note}</div>` : ''}
            ${ev.annotation ? `<div class="annotation-box"><div class="ann-label">💬 ${t('annotation')}</div><div class="ann-text">${ev.annotation}</div></div>` : ''}
          </div>`;
        }).join('')}`;
  }

  // Manager view — no separate eval, just annotations on self-evals
  return `<div class="page-header"><div><h1>📊 ${t('evaluations')}</h1></div>${homeBtn()}</div>
  ${state.employees.map(e => `<div class="section-card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div><h3>${e.name}</h3><span class="chip">${ROLE_ICONS[e.role]||''} ${e.role}</span></div>
    </div>
    ${e.evals.length === 0
      ? `<div style="font-size:0.85rem;color:var(--text-muted);margin-top:8px;font-weight:700;">Aucune auto-évaluation reçue</div>`
      : e.evals.map((ev, evIdx) => {
          const crit = getEvalCriteria(ev.role || e.role);
          const allS = crit.flatMap((s, si) => s.items.map((_, ii) => ev.scores[si+'-'+ii] || 0));
          const avg = allS.length ? (allS.reduce((a, b) => a + b, 0) / allS.length).toFixed(1) : '-';
          return `<div style="margin-top:1rem;padding:14px;background:var(--sky-pale);border-radius:14px;border:1.5px solid var(--border-light);">
            <div style="display:flex;justify-content:space-between;font-size:0.82rem;font-weight:800;color:var(--text-muted);margin-bottom:8px;">
              <span>${t('selfEval')} — ${ev.date}</span>
              <span style="color:var(--sky-deep);">Moy: ${avg}/5</span>
            </div>
            ${crit.map((section, si) => `<div style="font-size:0.75rem;font-weight:800;color:var(--sky-deep);margin:6px 0 4px;">${section.cat}</div>
              ${section.items.map((item, ii) => `<div style="display:flex;justify-content:space-between;font-size:0.82rem;padding:2px 0;font-weight:600;"><span>${item}</span><strong>${ev.scores[si+'-'+ii]||'—'}/5</strong></div>`).join('')}`).join('')}
            ${ev.note ? `<div style="margin-top:8px;font-size:0.82rem;font-style:italic;color:var(--text-muted);">${ev.note}</div>` : ''}
            ${ev.annotation
              ? `<div class="annotation-box"><div class="ann-label">💬 ${t('annotation')}</div><div class="ann-text">${ev.annotation}</div><button class="btn-sec" style="margin-top:8px;font-size:0.78rem;" onclick="openAnnotate('${e.id}','${ev.id}')">✏️ Modifier</button></div>`
              : `<button class="btn-sky" style="margin-top:10px;font-size:0.82rem;" onclick="openAnnotate('${e.id}','${ev.id}')">💬 ${t('annotate')}</button>`}
          </div>`;
        }).join('')}
  </div>`).join('')}`;
}

          <span style="color:var(--text-muted);font-size:14px;">⋮⋮</span>

        </div>`).join('')}

}

function updateSectionName(role, si, val) { const c = T[state.lang].evalCriteria[role]; if(c&&c[si]) c[si].cat=val; }
function updateCriterion(role, si, ii, val) { const c = T[state.lang].evalCriteria[role]; if(c&&c[si]) c[si].items[ii]=val; }

function addCriterion(role, si) { const c = T[state.lang].evalCriteria[role]; if(c&&c[si]) c[si].items.push('Nouveau critère'); setPage('criteriaEditor'); }
function removeCriterion(role, si, ii) { const c = T[state.lang].evalCriteria[role]; if(c&&c[si]&&c[si].items.length>1){c[si].items.splice(ii,1);setPage('criteriaEditor');}else showNotif('Au moins un critère requis.'); }

function updateRoleName(lang, i, val) {
  if (lang === 'fr') {
    const old = ROLES_FR[i];

    // Update ROLE_ICONS key if name changed
    if (old !== val) { ROLE_ICONS[val] = ROLE_ICONS[old]; }
    // Update employees with old role
    state.employees.forEach(e => { if(e.role===old) e.role=val; if(e.training) e.training=e.training.map(t=>t===old?val:t); });
  } else {
    ROLES_EN[i] = val;
    T.en.roles = ROLES_EN;
  }
}

function updateRoleIcon(i, val) {
  const role = ROLES_FR[i];
  ROLE_ICONS[role] = val;
  if (ROLES_EN[i]) ROLE_ICONS[ROLES_EN[i]] = val;
}

function addRole() {
  const fr = document.getElementById('new-role-fr').value.trim();
  const en = document.getElementById('new-role-en').value.trim();
  const icon = document.getElementById('new-role-icon').value.trim() || '👤';
  if (!fr) { showNotif('Nom français requis'); return; }
  if (ROLES_FR.includes(fr)) { showNotif('Ce poste existe déjà'); return; }
  ROLES_FR.push(fr);
  ROLES_EN.push(en || fr);
  ROLE_ICONS[fr] = icon;
  if (en) ROLE_ICONS[en] = icon;
  T.fr.roles = ROLES_FR;
  T.en.roles = ROLES_EN;
  // Add default eval criteria
  T.fr.evalCriteria[fr] = [{cat:'Compétences techniques',items:['Qualité du travail','Respect des procédures','Organisation']},{cat:'Comportement professionnel',items:['Ponctualité','Esprit d\'équipe','Attitude générale']}];
  T.en.evalCriteria[en||fr] = [{cat:'Technical skills',items:['Work quality','Procedure compliance','Organization']},{cat:'Professional behaviour',items:['Punctuality','Teamwork','General attitude']}];
  saveState();
  showNotif('✅ Poste ajouté!');
  setPage('rolesEditor');
}

function deleteRole(i) {
  const role = ROLES_FR[i];
  const count = state.employees.filter(e => e.role === role).length;
  if (count > 0) { showNotif(`❌ Impossible: ${count} employé(s) ont ce poste`); return; }
  if (!confirm("Supprimer le poste \"" + role + "\"?")) return;
  ROLES_FR.splice(i, 1);
  ROLES_EN.splice(i, 1);
  delete ROLE_ICONS[role];
  T.fr.roles = ROLES_FR;
  T.en.roles = ROLES_EN;
  saveState();
  showNotif('Poste supprimé');
  setPage('rolesEditor');
}

function getCustomOrDefaultQuiz(role) {
  return customQuizzes[role] || JSON.parse(JSON.stringify(T[state.lang].quizTemplates[role] || []));
}

function updateQuizQ(role, qi, val) { ensureCustomQuiz(role); customQuizzes[role][qi].q = val; }
function updateQuizOpt(role, qi, oi, val) { ensureCustomQuiz(role); customQuizzes[role][qi].opts[oi] = val; }
function setQuizAns(role, qi, oi) { ensureCustomQuiz(role); customQuizzes[role][qi].ans = oi; setPage('quizEditor'); }
function removeQuizQ(role, qi) { ensureCustomQuiz(role); if(customQuizzes[role].length>1){customQuizzes[role].splice(qi,1);setPage('quizEditor');}else showNotif('Au moins une question requise.'); }
function removeQuizOpt(role, qi, oi) { ensureCustomQuiz(role); if(customQuizzes[role][qi].opts.length>2){customQuizzes[role][qi].opts.splice(oi,1);if(customQuizzes[role][qi].ans>=customQuizzes[role][qi].opts.length)customQuizzes[role][qi].ans=0;setPage('quizEditor');}else showNotif('Au moins 2 options.'); }
function addQuizOpt(role, qi) { ensureCustomQuiz(role); customQuizzes[role][qi].opts.push('Nouvelle option'); setPage('quizEditor'); }
function addQuizQ(role) { ensureCustomQuiz(role); customQuizzes[role].push({q:'Nouvelle question',opts:['Option A','Option B','Option C','Option D'],ans:0}); setPage('quizEditor'); }
function ensureCustomQuiz(role) { if(!customQuizzes[role]) customQuizzes[role] = getCustomOrDefaultQuiz(role); }
function saveQuizzes() { saveState(); showNotif(t('saved')); }

// QUIZ (employee)
// ═══════════════════════════════════════════════════════
function startQuiz() {
  state.quizState = { qIdx: 0, answers: [], done: false };
  state.activePage = 'quiz';
  render();
}

function renderQuiz() {
  const emp = getMyEmp();
  const quiz = getQuiz(emp.role);
  const qs = state.quizState;

  if (!qs) return `<div class="page-header"><div><h1>🧩 ${t('quiz')}</h1></div>${homeBtn()}</div>`;

  if (qs.done) {
    const score = qs.answers.filter((a, i) => a === quiz[i].ans).length;
    return `<div class="page-header"><div><h1>🏆 Résultats</h1></div>${homeBtn()}</div>
    <div class="section-card" style="text-align:center;border-color:var(--green);background:var(--green-light);">
      <div style="font-size:3rem;margin-bottom:1rem;">🎉</div>
      <h2 style="color:var(--green-dark);margin-bottom:0.5rem;">${score}/${quiz.length} bonnes réponses</h2>
      <p style="color:var(--green-dark);font-weight:700;margin-bottom:1.5rem;">${score===quiz.length?'Parfait!':score>=quiz.length/2?'Bon travail!':'Révisez les documents et réessayez.'}</p>
      <button class="btn-sky" onclick="finishQuiz(${score},${quiz.length})">Continuer →</button>
    </div>`;
  }

  const q = quiz[qs.qIdx];
  const answered = qs.answers[qs.qIdx] !== undefined;

  return `<div class="page-header"><div><h1>🧩 ${t('quiz')}</h1><p>Question ${qs.qIdx+1} / ${quiz.length}</p></div>${homeBtn()}</div>
  <div class="section-card">
    <div style="margin-bottom:1rem;">
      <div class="progress-bar"><div class="progress-fill" style="width:${((qs.qIdx)/quiz.length)*100}%"></div></div>
    </div>
    <div class="quiz-card">
      <div class="quiz-q">${q.q}</div>
      <div class="quiz-options">
        ${q.opts.map((opt, oi) => {
          let cls = 'quiz-option';
          if (answered) {
            if (oi === q.ans) cls += ' correct';
            else if (oi === qs.answers[qs.qIdx]) cls += ' wrong';
          } else if (oi === qs.answers[qs.qIdx]) cls += ' selected';
          return `<div class="${cls}" onclick="selectQuizAnswer(${oi})">${opt}</div>`;
        }).join('')}
      </div>
    </div>
    ${answered ? `<div style="text-align:right;margin-top:1rem;">
      <button class="btn-sky" onclick="nextQuizQ(${quiz.length})">${qs.qIdx < quiz.length-1 ? 'Suivant →' : 'Voir les résultats →'}</button>
    </div>` : ''}
  </div>`;
}

function selectQuizAnswer(oi) {
  if (!state.quizState || state.quizState.answers[state.quizState.qIdx] !== undefined) return;
  state.quizState.answers[state.quizState.qIdx] = oi;
  render();
}

function nextQuizQ(total) {
  if (state.quizState.qIdx < total - 1) {
    state.quizState.qIdx++;
  } else {
    state.quizState.done = true;
  }
  render();
}

function finishQuiz(score, total) {
  const emp = getMyEmp();
  emp.quizResults = { score, total, date: new Date().toLocaleDateString(state.lang==='fr'?'fr-CA':'en-CA') };
  state.quizState = null;
  saveState();
  setPage('dashboard');
  showNotif('🏆 Quiz complété!');
}

      <div class="modal-header">
        <div>
          <h2>👋 Bienvenue, ${emp?.name?.split(' ')[0] || ''}!</h2>
          <div style="font-size:0.82rem;color:var(--text-muted);font-weight:700;">Première connexion — sécurisez votre compte</div>
        </div>
      </div>
      <div class="modal-body">
        <div style="background:var(--cream-pale);border:2px solid var(--cream);border-radius:14px;padding:1rem;margin-bottom:1.2rem;">
          <p style="font-size:0.88rem;font-weight:700;color:var(--navy);">🔒 Pour votre sécurité, veuillez choisir un nouveau mot de passe personnel. Votre mot de passe temporaire ne sera plus accepté après cette étape.</p>
        </div>
        <div class="form-row full" style="margin-bottom:1rem;">
          <div class="form-field">
            <label>Nouveau mot de passe</label>
            <input id="fl-pwd-new" type="password" placeholder="Choisissez un mot de passe sécurisé" autofocus>
          </div>
        </div>
        <div class="form-row full">
          <div class="form-field">
            <label>Confirmer le mot de passe</label>
            <input id="fl-pwd-confirm" type="password" placeholder="Répétez votre mot de passe">
          </div>
        </div>
      </div>
      <div class="modal-footer" style="justify-content:flex-end;">
        <button class="btn-sky" onclick="saveFirstLoginPwd('${m.empId}')">🔐 Confirmer mon mot de passe</button>
      </div>
    </div></div>`;
  }

  // COUNTER VAC
  if (m.type === 'counterVac') {
    const emp = state.employees.find(e => e.id === m.empId);
    const req = (emp?.vacationRequests||[]).find(r => r.id === m.reqId);
    return `<div class="modal-overlay" onclick="closeModal()"><div class="modal" style="max-width:440px;" onclick="event.stopPropagation()">
      <div class="modal-header"><h2>💬 Contre-proposition — ${emp?.name}</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <p style="font-size:0.85rem;color:var(--text-muted);font-weight:600;margin-bottom:1rem;">Proposez des dates alternatives à l'employé.</p>
        <div class="form-row full"><div class="form-field"><label>Date de début proposée</label><input id="counter-from" type="date"></div></div>
        <div class="form-row full"><div class="form-field"><label>Date de fin proposée</label><input id="counter-to" type="date"></div></div>
        <div class="form-row full"><div class="form-field"><label>Note (optionnel)</label><input id="counter-note" type="text" placeholder="Ex: Semaine chargée, peut-on décaler?"></div></div>
      </div>
      <div class="modal-footer">
        <button class="btn-sec" onclick="closeModal()">Annuler</button>
        <button class="btn-orange" onclick="saveCounterVac('${m.empId}','${m.reqId}')">📨 Envoyer la contre-proposition</button>
      </div>
    </div></div>`;
  }

  // SEND VAC FORM
  if (m.type === 'sendVacForm') {
    return `<div class="modal-overlay" onclick="closeModal()"><div class="modal" style="max-width:420px;" onclick="event.stopPropagation()">
      <div class="modal-header"><h2>📋 Envoyer le formulaire de vacances</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <p style="font-size:0.85rem;color:var(--text-muted);font-weight:600;margin-bottom:1rem;">Ce formulaire apparaîtra sur la page d'accueil de tous les employés actifs.</p>
        <div class="form-row full"><div class="form-field"><label>Année des vacances</label><input id="vac-form-year" type="number" value="${new Date().getFullYear()+1}" min="2024" max="2030"></div></div>
        <div style="background:var(--cream-pale);border:2px solid var(--cream);border-radius:12px;padding:12px;font-size:0.82rem;font-weight:700;color:var(--navy);">
          📨 ${state.employees.length} employé(s) recevront ce formulaire
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-sec" onclick="closeModal()">Annuler</button>
        <button class="btn-sky" onclick="sendVacFormToAll()">📋 Envoyer à tous</button>
      </div>
    </div></div>`;
  }

  return '';
}

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════
function setLang(l) { state.lang = l; render(); }
function switchMode() { state.authMode = state.authMode==='login'?'register':'login'; state.regTraining = []; render(); }
function setPage(p) { state.activePage = p; render(); }

function saveFirstLoginPwd(empId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return;
  const newPwd = document.getElementById('fl-pwd-new')?.value;
  const confirm = document.getElementById('fl-pwd-confirm')?.value;
  if (!newPwd || newPwd.length < 4) { showNotif('Le mot de passe doit avoir au moins 4 caractères'); return; }
  if (newPwd !== confirm) { showNotif('❌ Les mots de passe ne correspondent pas'); return; }
  emp.password = newPwd;
  emp.firstLogin = false;
  saveState();
  state.modal = null;
  render();
  showNotif('✅ Mot de passe configuré! Bienvenue ' + emp.name.split(' ')[0] + '!');
}

function closeModal() { state.modal = null; state.pendingFile = null; render(); }
function closeDocModal() { state.docModal = null; render(); }
function openDoc(id) { state.docModal = id; render(); }


function addPrime(empId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return;
  const amount = parseFloat(document.getElementById('prime-amount-'+empId)?.value);
  const desc = document.getElementById('prime-desc-'+empId)?.value?.trim();
  if (!amount || !desc) { showNotif('Montant et description requis'); return; }
  if (!emp.primes) emp.primes = [];
  emp.primes.push({ id: 'pr'+Date.now(), amount, desc, date: new Date().toLocaleDateString('fr-CA') });
  saveState();
  state.modal = {type:'empFile', empId}; render();
  showNotif('✅ Prime ajoutée');
}

function deletePrime(empId, primeId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp || !emp.primes) return;
  emp.primes = emp.primes.filter(p => p.id !== primeId);
  saveState();
  state.modal = {type:'empFile', empId}; render();
  showNotif('Prime supprimée');
}

function openEditEmp(id) {
  state.modal = {type:'editEmp', empId:id};
  render();
}

function saveEditEmp(empId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return;
  const name  = document.getElementById('edit-name').value.trim();
  const role  = document.getElementById('edit-role').value;
  const email = document.getElementById('edit-email').value.trim();
  const joined = document.getElementById('edit-joined').value;
  const pwd   = document.getElementById('edit-password').value;

  if (!name || !email) { showNotif('Nom et courriel requis'); return; }

  // Update training from grid
  const selCells = document.querySelectorAll('#edit-training-grid .sel');
  const training = selCells.length > 0 ? [...selCells].map(c => c.dataset.role) : [role];

  // Apply changes
  const oldName = emp.name;
  emp.name   = name;
  emp.role   = role;
  emp.email  = email;
  emp.joined = joined;
  emp.training = training;
  if (pwd && pwd.length >= 4) emp.password = pwd;

  // If current user is this employee, update currentUser name
  if (state.currentUser && state.currentUser.name === oldName) {
    state.currentUser.name = name;
    state.currentUser.role = role;
  }

  saveState();
  state.modal = {type:'empFile', empId: empId}; // reopen file modal
  render();
  showNotif('✅ ' + t('saved'));
}

function openEmpFile(id) { state.modal = {type:'empFile', empId:id}; render(); }
function openAddWarning(id) { state.modal = {type:'addWarning', empId:id}; render(); }
function openSalaryEdit(id) { state.modal = {type:'addSalary', empId:id}; render(); }
function openAddEmp() { state.modal = {type:'addEmp'}; render(); }
function openNewDoc() { state.pendingFile = null; state.modal = {type:'newDoc'}; render(); }
function openSelfEval() { const e = getMyEmp(); state.newEvalScores = {}; state.modal = {type:'eval', empId:e.id}; render(); }
function openAnnotate(empId, evalId) { state.modal = {type:'annotate', empId, evalId}; render(); }
function toggleRegTraining(r) { const i = state.regTraining.indexOf(r); i>-1?state.regTraining.splice(i,1):state.regTraining.push(r); render(); }
function logout() { state.screen='auth'; state.currentUser=null; state.authMode='login'; state.regTraining=[]; state.isManager=false; render(); }

function doAuth() {
  const email = document.getElementById('auth-email').value;
  if (!email) { showNotif('Email requis'); return; }

  if (state.authMode === 'register') {
    const name = document.getElementById('reg-name').value;
    const role = document.getElementById('reg-role').value;
    const pwd = document.getElementById('auth-pwd').value || '1234';
    if (!name) { showNotif('Nom requis'); return; }
    const training = state.regTraining.length > 0 ? state.regTraining : [role];
    const newEmp = {
      id: 'e'+Date.now(), name, role, email, password: pwd,
      training, joined: new Date().toISOString().split('T')[0],
      salary: [{date: new Date().toISOString().split('T')[0], amount: 17, note: 'Embauche'}],
      docs: {}, attestations: {}, warnings: [], evals: [], quizResults: null,
      notifications: {docs:0, salary:0, warnings:0, evals:0},
      firstLogin: true, primes: []
    };
    state.employees.push(newEmp);
    state.currentUser = {name, role};
    saveState();
  } else {
    const found = state.employees.find(e => e.email === email);
    if (!found) { showNotif('Courriel introuvable'); return; }
    const pwd = document.getElementById('auth-pwd').value;
    if (found.password && pwd !== found.password) { showNotif('Mot de passe incorrect'); return; }
    state.currentUser = {name: found.name, role: found.role};
    // Show first-login password change modal if it's their first time
    if (found.firstLogin) {
      state.isManager = false; state.screen = 'app'; state.activePage = 'dashboard';
      render();
      showNotif(t('welcome') + ', ' + state.currentUser.name.split(' ')[0] + '! 👋');
      setTimeout(() => { state.modal = {type:'firstLoginPwd', empId: found.id}; render(); }, 400);
      return;
    }
  }
  state.isManager = false; state.screen = 'app'; state.activePage = 'dashboard';
  // Vérifier si c'est la première connexion (mdp temporaire non changé)
  const loggedEmp = state.employees.find(e => e.name === state.currentUser?.name);
  if (loggedEmp && !loggedEmp.passwordChanged) {
    state.showFirstLoginModal = true;
    state.firstLoginEmpId = loggedEmp.id;
  }
  render(); showNotif(t('welcome') + ', ' + state.currentUser.name.split(' ')[0] + '! 👋');
}

function attestDoc(empId, docId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return;
  if (!emp.attestations) emp.attestations = {};
  emp.attestations[docId] = true;
  emp.attestations[docId+'_date'] = new Date().toLocaleDateString(state.lang==='fr'?'fr-CA':'en-CA');
  if (!emp.docs) emp.docs = {};
  emp.docs[docId] = true;
  saveState();
  closeDocModal(); showNotif(t('saved')); render();
}

function setScore(key, s) {
  state.newEvalScores[key] = s;
  const emp = state.employees.find(e => e.id === state.modal?.empId);
  const criteria = getEvalCriteria(emp ? emp.role : 'Cuisine');
  const parts = key.split('-');
  const si = parseInt(parts[0]);
  const ii = parseInt(parts[1]);
  let rowIdx = 0;
  for (let i = 0; i < si; i++) rowIdx += criteria[i].items.length;
  rowIdx += ii;
  const rows = document.querySelectorAll('.eval-row');
  if (rows[rowIdx]) rows[rowIdx].querySelectorAll('.score-dot').forEach((d, idx) => d.classList.toggle('active', idx < s));
}

function saveWarning(empId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return;
  const w = {
    id: 'w'+Date.now(),
    type: document.getElementById('warn-type').value,
    date: document.getElementById('warn-date').value,
    reason: document.getElementById('warn-reason').value,
    text: document.getElementById('warn-text').value || document.getElementById('warn-reason').value,
    signedBy: null, signedDate: null
  };
  emp.warnings.push(w);
  // Add notification
  if (!emp.notifications) emp.notifications = {docs:0,salary:0,warnings:0,evals:0};
  emp.notifications.warnings = (emp.notifications.warnings||0) + 1;
  sendPortalNotif(emp, '⚠️ Avertissement — Marius & Fanny RH', 'Un avertissement a été ajouté à votre dossier. Connectez-vous à votre portail RH pour le consulter et le signer.');
  saveState();
  closeModal(); showNotif(t('warningAdded')); render();
}

function signWarning(empId, warnId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return;
  const w = emp.warnings.find(w => w.id === warnId);
  if (!w) return;
  const nameInput = document.getElementById('warn-sign-'+warnId);
  if (!nameInput || !nameInput.value.trim()) { showNotif('Veuillez écrire votre nom complet'); return; }
  w.signedBy = nameInput.value.trim();
  w.signedDate = new Date().toLocaleDateString(state.lang==='fr'?'fr-CA':'en-CA');
  saveState(); showNotif(t('saved')); render();
}


function setSalType(type) {
  const salRow = document.getElementById('sal-amount-row');
  const benRow = document.getElementById('sal-benefit-row');
  const salBtn = document.getElementById('sal-type-salary');
  const benBtn = document.getElementById('sal-type-benefit');
  if (type === 'salary') {
    salRow.style.display = ''; benRow.style.display = 'none';
    salBtn.classList.add('sel'); benBtn.classList.remove('sel');
  } else {
    salRow.style.display = 'none'; benRow.style.display = '';
    benBtn.classList.add('sel'); salBtn.classList.remove('sel');
  }
}

function saveSalary(empId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return;
  const isBenefit = document.getElementById('sal-type-benefit')?.classList.contains('sel');
  const note = document.getElementById('sal-note')?.value || '';

  if (isBenefit) {
    const desc = document.getElementById('sal-benefit-desc')?.value?.trim();
    const date = document.getElementById('sal-date2')?.value || new Date().toISOString().split('T')[0];
    if (!desc) { showNotif('Description de l\'avantage requise'); return; }
    emp.salary.push({ type: 'benefit', date, benefit: desc, note, amount: null });
  } else {
    const amount = parseFloat(document.getElementById('sal-amount')?.value);
    const date = document.getElementById('sal-date')?.value || new Date().toISOString().split('T')[0];
    if (!amount) { showNotif('Montant requis'); return; }
    emp.salary.push({ type: 'salary', amount, date, note: note || 'Mise à jour' });
  }
  if (!emp.notifications) emp.notifications = {docs:0,salary:0,warnings:0,evals:0};
  emp.notifications.salary = (emp.notifications.salary||0) + 1;
  sendPortalNotif(emp, '💰 Mise à jour de votre dossier — Marius & Fanny RH', isBenefit ? 'Un avantage a été ajouté à votre profil.' : 'Votre salaire a été mis à jour. Connectez-vous à votre portail RH pour voir les détails.');
  saveState();
  closeModal(); showNotif(t('saved')); render();
}

function saveNewEmp() {
  const name = document.getElementById('emp-name').value;
  const role = document.getElementById('emp-role').value;
  const email = document.getElementById('emp-email').value;
  const password = document.getElementById('emp-password').value || '1234';
  const salary = parseFloat(document.getElementById('emp-salary').value) || 17;
  const date = document.getElementById('emp-date').value;
  if (!name) return;
  const selCells = document.querySelectorAll('#emp-training-grid .sel');
  const training = selCells.length > 0 ? [...selCells].map(c => c.dataset.role) : [role];
  state.employees.push({
    id: 'e'+Date.now(), name, role, email, password, training,
    joined: date, salary: [{date, amount: salary, note: 'Embauche'}],
    docs: {}, attestations: {}, warnings: [], evals: [], quizResults: null,
    notifications: {docs:0,salary:0,warnings:0,evals:0},
    firstLogin: true, primes: []
  });
  saveState();
  closeModal(); showNotif(t('saved')); render();
}

function saveEval(empId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return;
  const note = document.getElementById('eval-note') ? document.getElementById('eval-note').value : '';
  const ev = {
    id: 'ev'+Date.now(),
    date: new Date().toLocaleDateString(state.lang==='fr'?'fr-CA':'en-CA'),
    type: 'self', role: emp.role,
    scores: {...state.newEvalScores}, note, annotation: null
  };
  emp.evals.push(ev);
  // Notification for manager (we just save it)
  state.newEvalScores = {};
  saveState();
  closeModal(); showNotif(t('saved')); render();
}

function saveAnnotation(empId, evalId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return;
  const ev = emp.evals.find(e => e.id === evalId);
  if (!ev) return;
  ev.annotation = document.getElementById('ann-text').value;
  // Notification for employee
  if (!emp.notifications) emp.notifications = {docs:0,salary:0,warnings:0,evals:0};
  emp.notifications.evals = (emp.notifications.evals||0) + 1;
  sendPortalNotif(emp, '📊 Annotation sur votre évaluation — Marius & Fanny RH', 'Votre gestionnaire a ajouté une annotation à votre auto-évaluation. Connectez-vous à votre portail RH pour la consulter.');
  saveState();
  closeModal(); showNotif(t('saved')); render();
}

function saveNewDoc() {
  const name = document.getElementById('doc-name').value.trim();
  const cat = document.getElementById('doc-cat').value;
  if (!name) { showNotif('Nom requis'); return; }

  const selRoles = document.querySelectorAll('#doc-roles-grid .sel');
  const forRoles = selRoles.length > 0 ? [...selRoles].map(c => c.dataset.role) : null;

  const newDoc = {
    id: 'cd'+Date.now(), cat, isPDF: !!state.pendingFile,
    icon: '📄', iconColor: 'sky', title: name, sub: '',
    addedBy: 'Gestionnaire', addedDate: new Date().toISOString().split('T')[0],
    isNew: true, forRoles,
    content: state.pendingFile ? null : `<p>${name}</p>`
  };

  if (state.pendingFile) {
    const reader = new FileReader();
    reader.onload = (e) => {
      newDoc.dataUrl = e.target.result;
      customDocs.push(newDoc);
      // Add notification to relevant employees
      state.employees.forEach(emp => {
        if (!forRoles || forRoles.some(r => (emp.training||[]).includes(r))) {
          if (!emp.notifications) emp.notifications = {docs:0,salary:0,warnings:0,evals:0};
          emp.notifications.docs = (emp.notifications.docs||0) + 1;
        }
      });
      state.pendingFile = null;
      saveState(); closeModal(); showNotif(t('saved')); render();
    };
    reader.readAsDataURL(state.pendingFile);
  } else {
    customDocs.push(newDoc);
    state.employees.forEach(emp => {
      if (!forRoles || forRoles.some(r => (emp.training||[]).includes(r))) {
        if (!emp.notifications) emp.notifications = {docs:0,salary:0,warnings:0,evals:0};
        emp.notifications.docs = (emp.notifications.docs||0) + 1;
        sendPortalNotif(emp, '📁 Nouveau document — Marius & Fanny RH', 'Un nouveau document "'+name+'" a été ajouté à votre dossier. Connectez-vous à votre portail RH pour le consulter et l\'attester.');
      }
    });
    saveState(); closeModal(); showNotif(t('saved')); render();
  }
}

function deleteDoc(id) {
  if (!confirm('Supprimer ce document?')) return;
  customDocs = customDocs.filter(d => d.id !== id);
  saveState(); render(); showNotif('Document supprimé');
}

function handleFileSelect(evt) {
  const f = evt.target.files[0];
  if (f && (f.type === 'application/pdf' || f.name.endsWith('.pdf'))) {
    state.pendingFile = f; render();
  } else { showNotif('Fichier PDF requis'); }
}
function handleDrop(evt) {
  evt.preventDefault();
  const f = evt.dataTransfer.files[0];
  if (f && (f.type === 'application/pdf' || f.name.endsWith('.pdf'))) {
    state.pendingFile = f; render();
  } else { showNotif('Fichier PDF requis'); }
}

loadState();
initEmailJS();
render();
